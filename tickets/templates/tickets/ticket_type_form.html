{% extends 'base.html' %}

{% block title %}Ajouter Catégorie de Billet - {{ event.title }}{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <a href="{% url 'event-detail' event.pk %}" class="btn btn-secondary" style="margin-bottom: 1.5rem; font-size: 0.9rem;">&larr; Retour</a>
    
    <div class="card">
        <h1 style="margin-bottom: 2rem; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem;">Nouvelle Catégorie de Billet</h1>
        <p style="margin-bottom: 1.5rem;">Événement : <strong>{{ event.title }}</strong></p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Nom de la catégorie</label>
                <input type="text" name="name" id="name" class="form-control" required placeholder="Ex: Standard, VIP, Catégorie étudiant">
            </div>
            
            <div class="form-group">
                <label for="price">Prix (FCFA / XOF)</label>
                <input type="number" name="price" id="price" class="form-control" required min="0" step="100" placeholder="Ex: 5000">
            </div>
            
            <div class="form-group">
                <label for="quota">Quota disponible</label>
                <input type="number" name="quota" id="quota" class="form-control" required min="1" placeholder="Ex: 100">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">Créer la catégorie</button>
        </form>
    </div>
</div>
{% endblock %}
