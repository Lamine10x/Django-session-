{% extends 'base.html' %}

{% block title %}Inscription - EVENTPRO CI{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 3rem auto;">
    <div class="card">
        <h1 style="text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Créer un Compte</h1>
        
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="form-control" required placeholder="Ex: JeanDupont">
            </div>
            
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" name="email" id="email" class="form-control" required placeholder="email@exemple.ci">
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="role">Quel est votre profil ?</label>
                <select name="role" id="role" class="form-control">
                    {% for value, display in roles %}
                        {% if value != 'ADMIN' %}
                            <option value="{{ value }}">{{ display }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">S'inscrire</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Déjà inscrit ? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Se connecter</a>
        </p>
    </div>
</div>
{% endblock %}
