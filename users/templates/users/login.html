{% extends 'base.html' %}

{% block title %}Connexion - EVENTPRO CI{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="card">
        <h1 style="text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Se Connecter</h1>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" name="username" id="username" class="form-control" required placeholder="Ex: JeanDupont">
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" name="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">Connexion</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Pas encore de compte ? <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none; font-weight: 500;">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
