services:
  redis:
    image: redis:7-alpine
    container_name: eventpro-redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: eventpro-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      # Active le Channel Layer Redis (WebSocket temps reel)
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      # Persistance de la base et des uploads + rechargement du code
      - .:/app
